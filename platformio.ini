[env:nodemcuv2]
platform  = espressif8266
board     = nodemcuv2
framework = arduino

board_build.filesystem      = littlefs
board_build.filesystem_size = 0x80000   ; 512 KB для LittleFS
board_build.f_cpu           = 160000000L
board_build.arduino.lwip_variant = lm2f

; WiFiManager УДАЛЁН — он не использовался в коде и тратил ~50 KB флеша
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.4.2
    bodmer/TJpg_Decoder@^1.1.0

build_flags =
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=-1
    -D TFT_DC=0
    -D TFT_RST=2
    -D TFT_BL=5
    -D TOUCH_CS=-1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT7=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

monitor_speed = 115200

; --- Загрузка прошивки через USB ---
upload_protocol = esptool
; upload_port = COM3   ; укажите свой порт (Windows: COMx, Linux: /dev/ttyUSB0)

; --- Загрузка по воздуху (OTA) ---
; upload_protocol = espota
; upload_port     = 192.168.x.x   ; IP устройства
; upload_flags    = --auth=admin